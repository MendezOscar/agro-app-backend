services:
  db:
    image: postgis/postgis:16-3.4
    container_name: agroapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agroapp
      POSTGRES_PASSWORD: agroapp_dev
      POSTGRES_DB: agroapp
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroapp -d agroapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agroapp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agroapp
      MINIO_ROOT_PASSWORD: agroapp_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # consola web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 agroapp agroapp_dev;
      mc mb --ignore-existing local/agroapp-images;
      mc anonymous set download local/agroapp-images;
      exit 0;
      "

volumes:
  db_data:
  minio_data:
